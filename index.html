<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CesiumJS Performance Test</title>
  <script>window.CESIUM_BASE_URL = 'https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/';</script>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; overflow: hidden; }
    #cesiumContainer { width: 100vw; height: 100vh; position: relative; }
    #stats {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.85);
      padding: 20px;
      border-radius: 8px;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 14px;
      line-height: 1.6;
      z-index: 1000;
      border: 1px solid #333;
      min-width: 280px;
    }
    .stat-row { display: flex; justify-content: space-between; margin: 8px 0; }
    .stat-label { color: #888; }
    .stat-value { color: #0f0; font-weight: bold; }
    .stat-value.warn { color: #ff0; }
    .stat-value.danger { color: #f00; }
    #controls {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.85);
      padding: 20px;
      border-radius: 8px;
      z-index: 1000;
      border: 1px solid #333;
    }
    button {
      background: #2a2a2a;
      border: 1px solid #444;
      color: #fff;
      padding: 10px 16px;
      margin: 4px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    button:hover { background: #3a3a3a; border-color: #666; }
    button.active { background: #0a5; border-color: #0a5; color: #000; }
    select {
      background: #1a1a1a;
      border: 1px solid #444;
      color: #fff;
      padding: 8px 12px;
      border-radius: 4px;
      margin: 4px;
    }
    input[type="text"] {
      background: #1a1a1a;
      border: 1px solid #444;
      color: #fff;
      padding: 8px 12px;
      border-radius: 4px;
      margin: 4px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      border-color: #0a5;
    }
    .section { margin-top: 16px; padding-top: 16px; border-top: 1px solid #333; }
    .section-title { color: #888; font-size: 11px; text-transform: uppercase; margin-bottom: 8px; }
    .dpad-container {
      display: grid;
      grid-template-columns: repeat(3, 36px);
      grid-template-rows: repeat(3, 36px);
      gap: 4px;
      justify-content: center;
      margin: 12px auto;
    }
    .dpad-btn {
      padding: 0 !important;
      margin: 0 !important;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .dpad-center {
      display: flex;
      flex-direction: column;
      gap: 2px;
      height: 100%;
    }
    .dpad-center-btn {
      padding: 0 !important;
      margin: 0 !important;
      width: 100%;
      height: 17px;
      font-size: 10px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  
  <div id="stats">
    <div class="section-title">Performance</div>
    <div class="stat-row">
      <span class="stat-label">FPS</span>
      <span id="fps" class="stat-value">--</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Frame Time</span>
      <span id="frameTime" class="stat-value">-- ms</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Draw Calls</span>
      <span id="drawCalls" class="stat-value">--</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Triangles</span>
      <span id="triangles" class="stat-value">--</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">VRAM Used</span>
      <span id="vram" class="stat-value">-- MB</span>
    </div>
    <div class="section-title">Globe</div>
    <div class="stat-row">
      <span class="stat-label">Camera Height</span>
      <span id="cameraHeight" class="stat-value">-- km</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Tiles Loaded</span>
      <span id="tilesLoaded" class="stat-value">--</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Tiles Requested</span>
      <span id="tilesRequested" class="stat-value">--</span>
    </div>
  </div>

  <div id="controls">
    <div class="section-title">Terrain</div>
    <label><input type="checkbox" id="terrainEnabled" checked onchange="toggleTerrain()"> World Terrain</label><br>
    <label><input type="checkbox" id="terrainLighting" checked onchange="toggleLighting()"> Terrain Lighting</label><br>
    <label><input type="checkbox" id="terrainExaggeration" onchange="toggleExaggeration()"> Exaggeration (2x)</label><br>
    
    <div class="section-title">Imagery</div>
    <select id="imageryProvider" onchange="changeImagery()">
      <option value="bingAerial">Bing Maps Aerial</option>
      <option value="esriWorld">ESRI World Imagery</option>
      <option value="openStreetMap">OpenStreetMap</option>
      <option value="none">None (Wireframe)</option>
    </select><br>
    <label><input type="checkbox" id="atmosphereEnabled" checked onchange="toggleAtmosphere()"> Atmosphere</label><br>
    <label><input type="checkbox" id="fogEnabled" checked onchange="toggleFog()"> Fog</label><br>
    
    <div class="section-title">Camera Views</div>
    <button onclick="setCameraView('global')">Global View</button>
    <button onclick="setCameraView('city')">City View (15km)</button>
    <button onclick="setCameraView('street')">Street View (2km)</button>
    <button onclick="setCameraView('ground')">Ground Level (100m)</button>
    
    <div class="section-title">Navigation Controls</div>
    <div style="display: flex; gap: 16px; justify-content: center; align-items: center; margin-top: 8px;">
      <!-- Position D-pad -->
      <div style="text-align: center;">
        <span style="font-size: 10px; color: #888; text-transform: uppercase;">Move / Zoom</span>
        <div class="dpad-container">
          <div></div>
          <button class="dpad-btn" onclick="moveCamera('up')" title="Move Forward">▲</button>
          <div></div>
          
          <button class="dpad-btn" onclick="moveCamera('left')" title="Move Left">◀</button>
          <div class="dpad-center">
            <button class="dpad-center-btn" onclick="zoomIn()" title="Zoom In">+</button>
            <button class="dpad-center-btn" onclick="zoomOut()" title="Zoom Out">−</button>
          </div>
          <button class="dpad-btn" onclick="moveCamera('right')" title="Move Right">▶</button>
          
          <div></div>
          <button class="dpad-btn" onclick="moveCamera('down')" title="Move Backward">▼</button>
          <div></div>
        </div>
      </div>
      
      <!-- Rotation D-pad -->
      <div style="text-align: center;">
        <span style="font-size: 10px; color: #888; text-transform: uppercase;">Tilt / Look</span>
        <div class="dpad-container">
          <div></div>
          <button class="dpad-btn" onclick="rotateCamera('tiltUp')" title="Tilt Up">▲</button>
          <div></div>
          
          <button class="dpad-btn" onclick="rotateCamera('lookLeft')" title="Look Left">◀</button>
          <div class="dpad-center" style="justify-content: center;">
            <button class="dpad-center-btn" onclick="resetCamera()" style="height: 34px; font-size: 10px;" title="Reset View">R</button>
          </div>
          <button class="dpad-btn" onclick="rotateCamera('lookRight')" title="Look Right">▶</button>
          
          <div></div>
          <button class="dpad-btn" onclick="rotateCamera('tiltDown')" title="Tilt Down">▼</button>
          <div></div>
        </div>
      </div>
    </div>
    
    <div class="section-title">Find City</div>
    <div style="display: flex; gap: 4px; align-items: center; margin: 4px;">
      <input type="text" id="citySearch" placeholder="Enter city name..." style="flex: 1; min-width: 0;" onkeydown="if(event.key==='Enter') findCity()"/>
      <button onclick="findCity()" style="padding: 8px 12px;">Go</button>
    </div>

    <div class="section-title">Custom Model Alignment</div>
    <div style="font-size: 11px; margin: 4px; line-height: 1.5; color: #ccc;">
      <label>Scale: <span id="scaleVal" style="color: #0f0; font-weight: bold;">85.9</span>x<br>
        <input type="range" id="modelScale" min="0.1" max="100" step="0.1" value="85.9" oninput="adjustModel('scale', this.value)" style="width: 100%; margin: 2px 0 6px 0;"/>
      </label><br>
      
      <label>Heading (Rotation): <span id="headingVal" style="color: #0f0; font-weight: bold;">55</span>°<br>
        <input type="range" id="modelHeading" min="0" max="360" step="1" value="55" oninput="adjustModel('heading', this.value)" style="width: 100%; margin: 2px 0 6px 0;"/>
      </label><br>
      
      <label>Height Offset: <span id="heightVal" style="color: #0f0; font-weight: bold;">-10.0</span>m<br>
        <input type="range" id="modelHeight" min="-10" max="100" step="0.5" value="-10" oninput="adjustModel('height', this.value)" style="width: 100%; margin: 2px 0 6px 0;"/>
      </label><br>
      
      <label>Latitude: <span id="latVal" style="color: #0f0; font-weight: bold;">51.519650</span><br>
        <input type="range" id="modelLat" min="51.5170" max="51.5200" step="0.00001" value="51.51965" oninput="adjustModel('lat', this.value)" style="width: 100%; margin: 2px 0 6px 0;"/>
      </label><br>
      
      <label>Longitude: <span id="lonVal" style="color: #0f0; font-weight: bold;">-0.127180</span><br>
        <input type="range" id="modelLon" min="-0.1280" max="-0.1240" step="0.00001" value="-0.12718" oninput="adjustModel('lon', this.value)" style="width: 100%; margin: 2px 0 6px 0;"/>
      </label><br>
      <button onclick="getStartConfig()" style="width: 100%; margin: 6px 0; background: #0a5; color: #000; font-weight: bold; border-color: #0a5; padding: 10px 12px; border-radius: 4px; cursor: pointer; transition: all 0.2s;">Get Current Settings</button>
    </div>
    
    <div class="section-title">Stress Test</div>
    <button id="stressBtn" onclick="toggleStressTest()">Start Stress Test</button>
    <button onclick="resetCamera()">Reset Camera</button>
  </div>

  <script>
    let viewer;
    let stressTestActive = false;
    let stressRotationSpeed = 0.0005;
    let customModel;
    let modelState = {
      lat: 51.51965,
      lon: -0.12718,
      heightOffset: -10,
      heading: 55,
      scale: 85.9
    };
    
    function initViewer() {
      Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJjNDk2YzdlZi1lMTgzLTQ2MmUtOWIxZS0zNmQxMzQzMDg4YzIiLCJpZCI6NDQ1MjYxLCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoidW5kZWZpbmVkX2RlZmF1bHQiLCJpYXQiOjE3ODE2MTgyNTZ9.fi-U6op1xVJcqLCSGYNCKyZiY5grKVpSYx4XQQaji3g';
      
      viewer = new Cesium.Viewer('cesiumContainer', {
        terrain: Cesium.Terrain.fromWorldTerrain({
          requestVertexNormals: true,
          requestWaterMask: true,
        }),
        baseLayer: Cesium.ImageryLayer.fromProviderAsync(
          Cesium.createWorldImageryAsync({
            style: Cesium.IonWorldImageryStyle.AERIAL
          })
        ),
        fullscreenButton: false,
        homeButton: false,
        sceneModePicker: false,
        baseLayerPicker: false,
        geocoder: false,
        navigationHelpButton: false,
        animation: false,
        timeline: false,
        infoBox: false,
        selectionIndicator: false,
        navigationInstructionsInitiallyVisible: false,
        scene3DOnly: true,
        requestRenderMode: false,
        maximumRenderTimeChange: Infinity,
      });

      viewer.scene.globe.enableLighting = true;
      viewer.scene.skyAtmosphere.show = true;
      viewer.scene.sun.show = true;
      viewer.scene.moon.show = true;
      viewer.scene.fog.enabled = true;
      
      viewer.camera.setView({
        destination: Cesium.Cartesian3.fromDegrees(-0.11998240713621232, 51.51715855900223, 349.62060273944223),
        orientation: {
          heading: Cesium.Math.toRadians(305.0000007361942),
          pitch: Cesium.Math.toRadians(-29.999999107137405),
          roll: Cesium.Math.toRadians(359.99999852760385),
        },
      });



      updateCustomModel();

      startPerformanceMonitoring();
    }

    function startPerformanceMonitoring() {
      let frameCount = 0;
      let lastTime = performance.now();
      
      function updateStats() {
        const now = performance.now();
        frameCount++;
        
        if (now - lastTime >= 1000) {
          const fps = Math.round((frameCount * 1000) / (now - lastTime));
          const frameTime = (now - lastTime) / frameCount;
          
          const fpsEl = document.getElementById('fps');
          fpsEl.textContent = fps;
          fpsEl.className = 'stat-value' + (fps < 30 ? ' danger' : fps < 50 ? ' warn' : '');
          
          document.getElementById('frameTime').textContent = frameTime.toFixed(2) + ' ms';
          
          const scene = viewer.scene;
          const frameState = scene.frameState;
          
          if (frameState) {
            document.getElementById('drawCalls').textContent = frameState.calls?.length || '--';
            document.getElementById('triangles').textContent = frameState.triangles?.toLocaleString() || '--';
          }
          
          if (viewer.scene.globe._surface) {
            const tiles = viewer.scene.globe._surface._tileProvider?.quadtree?.tilesToRender?.length || 0;
            document.getElementById('tilesLoaded').textContent = tiles;
          }
          
          const cartographic = viewer.camera.positionCartographic;
          if (cartographic) {
            document.getElementById('cameraHeight').textContent = (cartographic.height / 1000).toFixed(1) + ' km';
          }
          
          if (navigator.gpu) {
            // WebGPU VRAM estimation not directly available
            document.getElementById('vram').textContent = 'N/A (WebGPU)';
          } else {
            document.getElementById('vram').textContent = '-- MB';
          }
          
          frameCount = 0;
          lastTime = now;
        }
        
        if (stressTestActive) {
          viewer.camera.rotate(Cesium.Cartesian3.UNIT_Z, stressRotationSpeed);
        }
        
        requestAnimationFrame(updateStats);
      }
      
      requestAnimationFrame(updateStats);
    }

    async function toggleTerrain() {
      const enabled = document.getElementById('terrainEnabled').checked;
      if (enabled) {
        try {
          const provider = await Cesium.createWorldTerrainAsync({
            requestVertexNormals: true,
            requestWaterMask: true,
          });
          viewer.terrainProvider = provider;
        } catch (error) {
          console.error('Error loading terrain:', error);
        }
      } else {
        viewer.terrainProvider = new Cesium.EllipsoidTerrainProvider();
      }
    }

    function toggleLighting() {
      const enabled = document.getElementById('terrainLighting').checked;
      viewer.scene.globe.enableLighting = enabled;
    }

    function toggleExaggeration() {
      const enabled = document.getElementById('terrainExaggeration').checked;
      viewer.scene.globe.terrainExaggeration = enabled ? 2.0 : 1.0;
    }

    function changeImagery() {
      const value = document.getElementById('imageryProvider').value;
      let providerPromise;
      
      switch (value) {
        case 'bingAerial':
          providerPromise = Cesium.createWorldImageryAsync({
            style: Cesium.IonWorldImageryStyle.AERIAL
          });
          break;
        case 'esriWorld':
          providerPromise = Cesium.ArcGisMapServerImageryProvider.fromUrl(
            'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
          );
          break;
        case 'openStreetMap':
          providerPromise = Promise.resolve(
            new Cesium.OpenStreetMapImageryProvider({
              url: 'https://tile.openstreetmap.org/'
            })
          );
          break;
        case 'none':
          providerPromise = Cesium.SingleTileImageryProvider.fromUrl(
            'https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Assets/Images/transparent.png'
          );
          break;
      }
      
      viewer.imageryLayers.removeAll();
      if (providerPromise) {
        viewer.imageryLayers.add(
          Cesium.ImageryLayer.fromProviderAsync(providerPromise)
        );
      }
    }

    function toggleAtmosphere() {
      viewer.scene.skyAtmosphere.show = document.getElementById('atmosphereEnabled').checked;
    }

    function toggleFog() {
      viewer.scene.fog.enabled = document.getElementById('fogEnabled').checked;
    }

    function setCameraView(view) {
      const destinations = {
        global: { lon: -0.126700, lat: 51.519800, height: 15000000 },
        city: { lon: -0.126700, lat: 51.519800, height: 15000 },
        street: { lon: -0.126700, lat: 51.519800, height: 2000 },
        ground: { lon: -0.126700, lat: 51.519800, height: 100 },
      };
      
      const d = destinations[view];
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(d.lon, d.lat, d.height),
        duration: 2,
        orientation: {
          heading: Cesium.Math.toRadians(0),
          pitch: Cesium.Math.toRadians(view === 'ground' ? -30 : view === 'street' ? -45 : -90),
          roll: 0,
        },
      });
    }

    function resetCamera() {
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(-0.11998240713621232, 51.51715855900223, 349.62060273944223),
        duration: 2,
        orientation: {
          heading: Cesium.Math.toRadians(305.0000007361942),
          pitch: Cesium.Math.toRadians(-29.999999107137405),
          roll: Cesium.Math.toRadians(359.99999852760385)
        }
      });
    }

    function moveCamera(direction) {
      if (!viewer) return;
      const height = viewer.camera.positionCartographic.height;
      // Move speed scales with height (10% of height per click, min 1.5m, max 800m)
      const amount = Math.max(Math.min(height * 0.1, 800), 1.5);
      
      switch (direction) {
        case 'left':
          viewer.camera.moveLeft(amount);
          break;
        case 'right':
          viewer.camera.moveRight(amount);
          break;
        case 'up':
          viewer.camera.moveForward(amount);
          break;
        case 'down':
          viewer.camera.moveBackward(amount);
          break;
      }
    }

    function rotateCamera(direction) {
      if (!viewer) return;
      const angle = Cesium.Math.toRadians(5);
      
      switch (direction) {
        case 'tiltUp':
          viewer.camera.lookUp(angle);
          break;
        case 'tiltDown':
          viewer.camera.lookDown(angle);
          break;
        case 'lookLeft':
          viewer.camera.lookLeft(angle);
          break;
        case 'lookRight':
          viewer.camera.lookRight(angle);
          break;
      }
    }

    function updateCustomModel() {
      if (!viewer) return;
      
      if (customModel) {
        viewer.entities.remove(customModel);
      }
      
      const position = Cesium.Cartesian3.fromDegrees(modelState.lon, modelState.lat, modelState.heightOffset);
      const headingRad = Cesium.Math.toRadians(modelState.heading);
      const pitch = 0;
      const roll = 0;
      const hpr = new Cesium.HeadingPitchRoll(headingRad, pitch, roll);
      const orientation = Cesium.Transforms.headingPitchRollQuaternion(position, hpr);
      
      customModel = viewer.entities.add({
        name: "British Museum Custom Model",
        position: position,
        orientation: orientation,
        model: {
          uri: '1-2.glb',
          scale: modelState.scale,
          heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND
        }
      });
    }

    function adjustModel(param, value) {
      const parsed = parseFloat(value);
      if (param === 'scale') {
        modelState.scale = parsed;
        document.getElementById('scaleVal').textContent = parsed.toFixed(1);
      } else if (param === 'heading') {
        modelState.heading = parsed;
        document.getElementById('headingVal').textContent = Math.round(parsed);
      } else if (param === 'height') {
        modelState.heightOffset = parsed;
        document.getElementById('heightVal').textContent = parsed.toFixed(1);
      } else if (param === 'lat') {
        modelState.lat = parsed;
        document.getElementById('latVal').textContent = parsed.toFixed(6);
      } else if (param === 'lon') {
        modelState.lon = parsed;
        document.getElementById('lonVal').textContent = parsed.toFixed(6);
      }
      updateCustomModel();
    }

    function getStartConfig() {
      if (!viewer) return;
      
      const modelConfig = { ...modelState };
      const camPosition = viewer.camera.positionCartographic;
      const cameraConfig = {
        lon: Cesium.Math.toDegrees(camPosition.longitude),
        lat: Cesium.Math.toDegrees(camPosition.latitude),
        height: camPosition.height,
        heading: Cesium.Math.toDegrees(viewer.camera.heading),
        pitch: Cesium.Math.toDegrees(viewer.camera.pitch),
        roll: Cesium.Math.toDegrees(viewer.camera.roll)
      };
      
      const config = {
        modelState: modelConfig,
        camera: cameraConfig
      };
      
      const configStr = JSON.stringify(config, null, 2);
      
      const overlay = document.createElement('div');
      overlay.style.position = 'fixed';
      overlay.style.top = '0';
      overlay.style.left = '0';
      overlay.style.width = '100vw';
      overlay.style.height = '100vh';
      overlay.style.background = 'rgba(0,0,0,0.85)';
      overlay.style.zIndex = '9999';
      overlay.style.display = 'flex';
      overlay.style.alignItems = 'center';
      overlay.style.justifyContent = 'center';
      overlay.id = 'configOverlay';
      
      const dialog = document.createElement('div');
      dialog.style.background = '#1a1a1a';
      dialog.style.border = '1px solid #333';
      dialog.style.borderRadius = '8px';
      dialog.style.padding = '24px';
      dialog.style.width = '460px';
      dialog.style.color = '#fff';
      dialog.style.boxShadow = '0 8px 32px rgba(0,0,0,0.5)';
      
      dialog.innerHTML = `
        <h3 style="margin-top:0; color:#0f0; font-family:sans-serif;">Current Startup Config</h3>
        <p style="font-size:12px; color:#aaa; font-family:sans-serif; margin-bottom:12px; line-height:1.4;">Copy this config and paste it in the chat. I will apply these exact model coordinates and camera view as your permanent starting point.</p>
        <textarea id="configText" readonly style="width:100%; height:180px; background:#000; color:#0f0; border:1px solid #444; padding:8px; border-radius:4px; font-family:monospace; font-size:11px; resize:none; outline:none;">${configStr}</textarea>
        <div style="margin-top:16px; display:flex; justify-content:flex-end; gap:8px;">
          <button id="closeConfigBtn" style="background:#333; border:1px solid #444; color:#fff; padding:8px 16px; border-radius:4px; cursor:pointer; font-size:12px;">Close</button>
          <button id="copyConfigBtn" style="background:#0a5; border:1px solid #0a5; color:#000; font-weight:bold; padding:8px 16px; border-radius:4px; cursor:pointer; font-size:12px;">Copy to Clipboard</button>
        </div>
      `;
      
      overlay.appendChild(dialog);
      document.body.appendChild(overlay);
      
      document.getElementById('closeConfigBtn').onclick = () => overlay.remove();
      
      const copyBtn = document.getElementById('copyConfigBtn');
      copyBtn.onclick = () => {
        const text = document.getElementById('configText').value;
        navigator.clipboard.writeText(text).then(() => {
          copyBtn.textContent = 'Copied!';
          copyBtn.style.background = '#083';
          copyBtn.style.borderColor = '#083';
          setTimeout(() => {
            copyBtn.textContent = 'Copy to Clipboard';
            copyBtn.style.background = '#0a5';
            copyBtn.style.borderColor = '#0a5';
          }, 1500);
        });
      };
    }

    function toggleStressTest() {
      const btn = document.getElementById('stressBtn');
      stressTestActive = !stressTestActive;
      btn.textContent = stressTestActive ? 'Stop Stress Test' : 'Start Stress Test';
      btn.classList.toggle('active', stressTestActive);
    }

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        toggleStressTest();
      }
    });

    function zoomIn() {
      if (!viewer) return;
      const height = viewer.camera.positionCartographic.height;
      viewer.camera.zoomIn(Math.max(height * 0.3, 50));
    }

    function zoomOut() {
      if (!viewer) return;
      const height = viewer.camera.positionCartographic.height;
      viewer.camera.zoomOut(Math.max(height * 0.3, 50));
    }

    async function findCity() {
      const query = document.getElementById('citySearch').value.trim();
      if (!query) return;
      
      const searchBtn = document.querySelector('[onclick="findCity()"]');
      const originalText = searchBtn.textContent;
      searchBtn.textContent = '...';
      searchBtn.disabled = true;
      
      try {
        const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
        const data = await response.json();
        
        if (data && data.length > 0) {
          const lat = parseFloat(data[0].lat);
          const lon = parseFloat(data[0].lon);
          
          viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(lon, lat, 15000),
            duration: 2.5
          });
        } else {
          alert('City not found. Please try another name.');
        }
      } catch (error) {
        console.error('Error finding city:', error);
        alert('An error occurred while searching. Please try again.');
      } finally {
        searchBtn.textContent = originalText;
        searchBtn.disabled = false;
      }
    }

    initViewer();
  </script>
</body>
</html>
